<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var path = location.pathname;
        // Only cache-bust the splash/home route — never wipe /reset-password, /login, etc.
        if (
          (path === '/' || path === '/index.html') &&
          location.search.indexOf('v=trugo') === -1
        ) {
          location.replace('/?v=trugo-' + Date.now() + location.hash);
          return;
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/trugo-sync-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Trugo Sync</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
